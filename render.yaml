# Render Blueprint 配置文件
# 文档: https://render.com/docs/blueprint-spec

services:
  # ============ Web 服务 ============
  - type: web
    name: nursing-home
    env: node
    region: singapore  # 新加坡节点，国内访问较快
    plan: free         # 免费计划（每月 750 小时免费额度）

    # 构建命令（相对于仓库根目录）
    buildCommand: |
      cd nursing-home && npm install
      cd server && npm install
      cd ../client && npm install && npm run build

    # 启动命令
    startCommand: cd nursing-home && node server/index.js

    # 健康检查路径
    healthCheckPath: /api/dashboard/stats

    # 环境变量
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nursing-home-db
          property: connectionString

databases:
  # ============ PostgreSQL 数据库 ============
  - name: nursing-home-db
    region: singapore
    plan: free         # 免费计划（100MB 存储，够用）
    databaseName: nursing_home
    ipAllowList: []    # 仅允许 Render 内部网络访问
